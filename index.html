<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root{
--c1:#fff;
--c2:#000;
--c3:#111;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:var(--c2);
color:var(--c1);
overflow:hidden;
cursor:none;
}

#cursor{
position:fixed;
width:10px;
height:10px;
background:var(--c1);
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:60px;
left:20px;
background:var(--c3);
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
z-index:999;
}

section{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
opacity:0;
transform:translateY(20px);
transition:.4s ease;
}

section.active{
display:flex;
opacity:1;
transform:translateY(0);
}

.card{
background:var(--c3);
padding:40px;
border-radius:20px;
text-align:center;
width:420px;
max-width:90%;
}

.card img{
width:150px;
height:150px;
border-radius:50%;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:15px;
}

.lang{
background:var(--c3);
padding:15px;
border-radius:15px;
text-align:center;
}

.lang img{
width:40px;
height:40px;
margin-bottom:8px;
animation:float 5s ease-in-out infinite;
}

.btn{
display:block;
margin-top:10px;
padding:12px;
background:#fff;
color:#000;
border-radius:10px;
text-decoration:none;
transition:.2s;
}

.btn:hover{
transform:scale(1.03);
}

.project img{
width:100%;
border-radius:15px;
margin-top:10px;
}
</style>
</head>

<body>

<div id="cursor"></div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<div onclick="show('home')">Home</div>
<div onclick="show('exp')">Experiences</div>
<div onclick="show('projects')">Projects</div>
</div>

<section id="home" class="active">
<div class="card">
<img src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<h1>Ahmed</h1>
<p>Developer</p>
</div>
</section>

<section id="exp">
<div class="card">
<h2>Experiences</h2>

<div class="grid">

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/732/732212.png">
<p>HTML</p>
</div>

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/732/732190.png">
<p>CSS</p>
</div>

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png">
<p>JavaScript</p>
</div>

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
<p>Python</p>
</div>

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/919/919830.png">
<p>PHP</p>
</div>

<div class="lang">
<img src="https://cdn-icons-png.flaticon.com/512/226/226777.png">
<p>Java</p>
</div>

</div>

</div>
</section>

<section id="projects">
<div class="card">
<h2>Final Bank</h2>

<img src="https://i.ibb.co/9jj6hFw/958d5cb18110.png">

<a class="btn" href="#">Add Bot</a>
<a class="btn" href="#">Support Server</a>

</div>
</section>

<script>

document.addEventListener("mousemove",e=>{
let c=document.getElementById("cursor");
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
});

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=(m.style.display==="flex")?"none":"flex";
}

function show(id){
document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active");
});
document.getElementById(id).classList.add("active");
document.getElementById("menu").style.display="none";
}

</script>

</body>
</html>
