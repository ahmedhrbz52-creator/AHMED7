<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Profile</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#000;
color:#fff;
overflow:hidden;
transition:0.3s;
cursor:none;
}

.light-mode{
background:#fff;
color:#000;
}

/* background particles */
.bg span{
position:absolute;
width:4px;
height:4px;
background:#fff;
opacity:0.2;
animation:move 10s linear infinite;
}
.light-mode .bg span{background:#000;}

@keyframes move{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* cursor */
#cursor{
position:fixed;
width:10px;
height:10px;
background:#fff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:9999;
}
.light-mode #cursor{background:#000;}

/* click light */
.click-light{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:#fff;
box-shadow:0 0 30px #fff,0 0 60px #fff;
transform:translate(-50%,-50%);
animation:light 0.5s forwards;
}
.light-mode .click-light{
background:#000;
box-shadow:0 0 30px #000,0 0 60px #000;
}

@keyframes light{
to{opacity:0;transform:translate(-50%,-50%) scale(6);}
}

/* nav */
nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:1000;
}
nav div{cursor:pointer;}

/* toggle */
.toggle{
position:fixed;
top:20px;
right:20px;
width:28px;
height:28px;
cursor:pointer;
}

.toggle svg{
width:100%;
height:100%;
fill:#fff;
}
.light-mode .toggle svg{fill:#000;}

/* sections */
section{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}
.active{display:flex;}

/* card */
.card{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:320px;
}
.light-mode .card{background:#eee;}

.card img{
width:140px;
height:140px;
border-radius:50%;
animation:float 3s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* discord */
.discord{
margin-top:15px;
cursor:pointer;
}
.discord svg{
width:35px;
height:35px;
fill:#fff;
}
.light-mode .discord svg{fill:#000;}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
width:100%;
max-width:500px;
}

.lang{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
}
.light-mode .lang{background:#ddd;}

.lang img{
width:40px;
animation:float 2s infinite;
}

/* project */
.project{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
max-width:320px;
}
.light-mode .project{background:#eee;}

.project img{
width:100%;
border-radius:15px;
}

.btns{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.btn{
padding:10px;
border-radius:10px;
background:#fff;
color:#000;
text-decoration:none;
}

/* loader */
#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
z-index:999;
}
.light-mode #loader{background:#fff;}

.loader-img{
width:80px;
height:80px;
border-radius:50%;
animation:float 2s infinite;
}

.progress-bar{
width:70%;
height:20px;
background:#222;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0;
background:#fff;
animation:load 4s forwards;
}
.light-mode .progress{background:#000;}

@keyframes load{to{width:100%;}}

.hide{animation:fade 1s forwards;}
@keyframes fade{to{opacity:0;visibility:hidden;}}
</style></head><body><div class="bg"></div>
<div id="cursor"></div><div id="loader">
<img class="loader-img" src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<div class="progress-bar"><div class="progress"></div></div>
</div><nav>
<div onclick="show('home')">Home</div>
<div onclick="show('exp')">Experiences</div>
<div onclick="show('projects')">Projects</div>
</nav><div class="toggle" onclick="toggleMode()" id="themeBtn">
<svg viewBox="0 0 24 24">
<path d="M12 3a9 9 0 100 18 7 7 0 010-18z"/>
</svg>
</div><section id="home" class="active">
<div class="card">

<svg viewBox="0 0 24 24">
<path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515a.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.249a18.27 18.27 0 00-5.487 0a12.64 12.64 0 00-.617-1.249a.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.369a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.056a19.9 19.9 0 006.104 3.03a.078.078 0 00.084-.027c.47-.64.888-1.3 1.249-1.98a.076.076 0 00-.041-.105a13.107 13.107 0 01-1.872-.892a.077.077 0 01-.008-.128c.126-.095.252-.194.372-.293a.074.074 0 01.077-.01c3.927 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.099.246.198.372.293a.077.077 0 01-.006.128a12.299 12.299 0 01-1.873.892a.077.077 0 00-.04.106c.37.68.789 1.34 1.248 1.98a.077.077 0 00.084.028a19.89 19.89 0 006.108-3.03a.077.077 0 00.03-.056c.5-5.177-.838-9.668-3.548-13.661zM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.418 2.157-2.418c1.21 0 2.176 1.095 2.157 2.418c0 1.334-.946 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.418 2.157-2.418c1.21 0 2.176 1.095 2.157 2.418c0 1.334-.946 2.419-2.157 2.419z"/>
</svg>
</div></div>
</section><section id="exp">
<div class="grid">
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732212.png"><p>HTML</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732190.png"><p>CSS</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png"><p>JavaScript</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png"><p>Python</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/226/226777.png"><p>Java</p></div>
</div>
</section><section id="projects">
<div class="project">

</div>
</div>
</section><script>
for(let i=0;i<50;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.querySelector(".bg").appendChild(s);
}

const c=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
});

document.addEventListener("click",e=>{
let d=document.createElement("div");
d.className="click-light";
d.style.left=e.clientX+"px";
d.style.top=e.clientY+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),500);
});

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMode(){
document.body.classList.toggle("light-mode");
}

function openDiscord(){
window.open("https://discord.com/users/1303062740092588132","_blank");
}

setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},4000);
</script></body>
</html>
