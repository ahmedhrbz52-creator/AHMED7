<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Profile</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{background:#000;color:#fff;overflow:hidden;cursor:none;}

.menu-btn{position:fixed;top:20px;left:20px;font-size:28px;cursor:pointer;z-index:1000;}

.menu{position:fixed;top:60px;left:20px;background:#111;padding:15px;border-radius:10px;display:none;flex-direction:column;gap:10px;}
.menu div{cursor:pointer;}

.bg span{position:absolute;width:4px;height:4px;background:#fff;opacity:0.2;animation:move 10s linear infinite;}

@keyframes move{from{transform:translateY(100vh);}to{transform:translateY(-10vh);}}

#cursor{position:fixed;width:10px;height:10px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;}

.click-light{position:fixed;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 0 30px #fff;transform:translate(-50%,-50%);animation:light 0.5s forwards;}

@keyframes light{to{opacity:0;transform:translate(-50%,-50%) scale(6);}}

section{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;padding:20px;}
.active{display:flex;}

.card{background:#111;padding:40px;border-radius:20px;text-align:center;width:400px;max-width:90%;}
.card img{width:160px;height:160px;border-radius:50%;animation:float 3s infinite;}

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

.discord svg{width:40px;fill:#fff;cursor:pointer;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;width:100%;max-width:600px;}

.lang{background:#111;padding:15px;border-radius:15px;text-align:center;}
.lang img{width:40px;animation:float 2s infinite;}

.project{background:#111;padding:20px;border-radius:20px;text-align:center;width:400px;max-width:90%;}
.project img{width:100%;border-radius:15px;}

.btn{display:block;margin-top:10px;padding:12px;background:#fff;color:#000;border-radius:10px;text-decoration:none;}

input, textarea{width:100%;margin-top:10px;padding:12px;border:none;border-radius:10px;}

button{margin-top:10px;padding:12px;border:none;border-radius:10px;cursor:pointer;}

.comments{margin-top:15px;width:400px;max-width:90%;max-height:200px;overflow:auto;}
.comment{background:#111;padding:10px;border-radius:10px;margin-top:10px;}

#loader{position:fixed;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:15px;z-index:999;}
.progress-bar{width:70%;height:20px;background:#222;border-radius:50px;overflow:hidden;}
.progress{height:100%;width:0;background:#fff;animation:load 4s forwards;}
@keyframes load{to{width:100%;}}

.loader-img{width:90px;height:90px;border-radius:50%;animation:float 2s infinite;}
</style></head><body><div class="bg"></div>
<div id="cursor"></div><div id="loader">
<img class="loader-img" src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<div class="progress-bar"><div class="progress"></div></div>
</div><div class="menu-btn" onclick="toggleMenu()">☰</div><div class="menu" id="menu">
<div onclick="show('home')">Home</div>
<div onclick="show('exp')">Experiences</div>
<div onclick="show('projects')">Projects</div>
<div onclick="show('feedback')">Feedback</div>
<div onclick="show('contact')">Contact Me</div>
</div><section id="home" class="active">
<div class="card">
<img src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<h1>Ahmed</h1>
<p>Developer</p><div class="discord" onclick="openDiscord()">
<svg viewBox="0 0 24 24">
<path d="M20.317 4.369a19.791 19.791 0 00-4.885-1.515a.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.249a18.27 18.27 0 00-5.487 0a12.64 12.64 0 00-.617-1.249a.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.369a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.056a19.9 19.9 0 006.104 3.03a.078.078 0 00.084-.027c.47-.64.888-1.3 1.249-1.98a.076.076 0 00-.041-.105a13.107 13.107 0 01-1.872-.892a.077.077 0 01-.008-.128c.126-.095.252-.194.372-.293a.074.074 0 01.077-.01c3.927 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.099.246.198.372.293a.077.077 0 01-.006.128a12.299 12.299 0 01-1.873.892a.077.077 0 00-.04.106c.37.68.789 1.34 1.248 1.98a.077.077 0 00.084.028a19.89 19.89 0 006.108-3.03a.077.077 0 00.03-.056c.5-5.177-.838-9.668-3.548-13.661zM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.418 2.157-2.418c1.21 0 2.176 1.095 2.157 2.418c0 1.334-.946 2.419-2.157 2.419zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419c0-1.333.955-2.418 2.157-2.418c1.21 0 2.176 1.095 2.157 2.418c0 1.334-.946 2.419-2.157 2.419z"/>
</svg>
</div></div>
</section><section id="exp">
<div class="grid">
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732212.png"><p>HTML</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732190.png"><p>CSS</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png"><p>JavaScript</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png"><p>Python</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/226/226777.png"><p>Java</p></div>
</div>
</section><section id="projects">
<div class="project">
<img src="https://i.ibb.co/9jj6hFw/958d5cb18110.png">
<h2>Final Bank</h2>
<p>اقوي بوت بنك في الوطن العربي</p>
<a class="btn" href="https://discord.com/oauth2/authorize?client_id=1478406907906621696" target="_blank">Add Bot</a>
<a class="btn" href="https://discord.gg/7a4yDfG9QJ" target="_blank">Support Server</a>
</div>
</section><section id="feedback">
<div class="card">
<h2>تقييم الموقع</h2>
<input id="name" placeholder="اسمك">
<textarea id="msg" placeholder="اكتب تقييمك"></textarea>
<button onclick="send()">إرسال</button>
</div>
<div class="comments" id="comments"></div>
</section><section id="contact">
<div class="card">
<h2>Contact Me</h2>
<input id="contactId" placeholder="Discord ID">
<textarea id="contactMsg" placeholder="اكتب رسالتك"></textarea>
<button onclick="sendContact()">إرسال</button>
<p id="status"></p>
</div>
</section><script>
let saved = JSON.parse(localStorage.getItem("comments") || "[]");

function render(){
let box=document.getElementById("comments");
box.innerHTML="";
saved.forEach(c=>{
let div=document.createElement("div");
div.className="comment";
div.innerHTML="<b>"+c.name+"</b><br>"+c.msg;
box.appendChild(div);
});
}

function send(){
let name=document.getElementById("name").value;
let msg=document.getElementById("msg").value;
if(!name || !msg) return;

saved.unshift({name,msg});
localStorage.setItem("comments",JSON.stringify(saved));
render();

document.getElementById("name").value="";
document.getElementById("msg").value="";
}

function validId(id){
return /^[0-9]{17,20}$/.test(id);
}

async function sendContact(){
let id=document.getElementById("contactId").value;
let msg=document.getElementById("contactMsg").value;
let status=document.getElementById("status");

if(!validId(id)){
status.innerText="ID غير صالح";
return;
}

if(!msg){
status.innerText="اكتب رسالة";
return;
}

let data={
username:id,
embeds:[
{
title:"رسالة جديدة",
description:msg,
color:0x000000
}
]
};

try{
await fetch("https://discord.com/api/webhooks/1493238082244444381/R6UsfhZF1nSAKXWWbl8xwgGIkj5hsIsBB2Vgm5ocMh_tp9I77rHS1zMbiu4-qmlK4lp6",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});
status.innerText="تم الإرسال";
}catch{
status.innerText="فشل الإرسال";
}
}

render();

for(let i=0;i<50;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.querySelector(".bg").appendChild(s);
}

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

document.addEventListener("click",e=>{
let d=document.createElement("div");
d.className="click-light";
d.style.left=e.clientX+"px";
d.style.top=e.clientY+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),500);
});

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="flex"?"none":"flex";
}

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
toggleMenu();
}

function openDiscord(){
window.open("https://discord.com/users/1303062740092588132","_blank");
}

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},4000);
</script></body>
</html>
