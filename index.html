<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Profile</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#000;
color:white;
overflow:hidden;
transition:0.3s;
cursor:none;
}

.light-mode{
background:#fff;
color:#000;
}

.bg span{
position:absolute;
width:4px;height:4px;
background:white;
opacity:0.2;
animation:move 10s linear infinite;
}
.light-mode .bg span{background:black;}

@keyframes move{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#cursor{
position:fixed;
width:10px;height:10px;
background:white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}
.light-mode #cursor{background:black;}

.click-light{
position:fixed;
width:20px;height:20px;
border-radius:50%;
background:white;
box-shadow:0 0 30px white,0 0 60px white;
transform:translate(-50%,-50%);
animation:light 0.5s forwards;
}
.light-mode .click-light{
background:black;
box-shadow:0 0 30px black,0 0 60px black;
}

@keyframes light{
to{opacity:0;transform:translate(-50%,-50%) scale(6);}
}

nav{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:1000;
}

nav div{
cursor:pointer;
font-weight:500;
}

.toggle{
position:fixed;
top:20px;
right:20px;
cursor:pointer;
font-size:22px;
}

section{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.active{display:flex;}

.card{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:320px;
}
.light-mode .card{background:#eee;}

.card img{
width:140px;height:140px;
border-radius:50%;
animation:float 3s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
width:100%;
max-width:500px;
}

.lang{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
}
.light-mode .lang{background:#ddd;}

.lang img{
width:40px;
animation:float 2s infinite;
}

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
z-index:999;
}
.light-mode #loader{background:#fff;}

.loader-img{
width:80px;height:80px;
border-radius:50%;
animation:float 2s infinite;
}

.progress-bar{
width:70%;
height:20px;
background:#222;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0;
background:white;
animation:load 4s forwards;
}
.light-mode .progress{background:black;}

@keyframes load{to{width:100%;}}

.hide{animation:fade 1s forwards;}
@keyframes fade{to{opacity:0;visibility:hidden;}}
</style></head><body><div class="bg"></div>
<div id="cursor"></div><div id="loader">
<img class="loader-img" src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<div class="progress-bar"><div class="progress"></div></div>
</div><nav>
<div onclick="show('home')">Home</div>
<div onclick="show('exp')">Experiences</div>
</nav><div class="toggle" onclick="toggleMode()">🌙</div><section id="home" class="active">
<div class="card">
<img src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<h1>Ahmed</h1>
<p>Developer</p>
</div>
</section><section id="exp">
<div class="grid">
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732212.png"><p>HTML</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/732/732190.png"><p>CSS</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/226/226777.png"><p>Java</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png"><p>JavaScript</p></div>
<div class="lang"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png"><p>Python</p></div>
</div>
</section><script>
for(let i=0;i<50;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.querySelector(".bg").appendChild(s);
}

const c=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
c.style.left=e.clientX+"px";
c.style.top=e.clientY+"px";
});

document.addEventListener("click",e=>{
let d=document.createElement("div");
d.className="click-light";
d.style.left=e.clientX+"px";
d.style.top=e.clientY+"px";
document.body.appendChild(d);
setTimeout(()=>d.remove(),500);
});

setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},4000);

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function toggleMode(){
document.body.classList.toggle("light-mode");
document.querySelector(".toggle").textContent=
document.body.classList.contains("light-mode")?"☀️":"🌙";
}
</script></body>
</html>
