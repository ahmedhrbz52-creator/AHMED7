<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Profile</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins, Arial;
}

body{
background:#000;
overflow:hidden;
color:white;
cursor:none;
}

.bg span{
position:absolute;
width:4px;
height:4px;
background:white;
opacity:0.2;
animation:move 10s linear infinite;
}

@keyframes move{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

#cursor{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}

.click-light{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:white;
box-shadow:0 0 30px white, 0 0 60px white;
transform:translate(-50%,-50%);
animation:light 0.5s ease-out forwards;
pointer-events:none;
}

@keyframes light{
to{opacity:0; transform:translate(-50%,-50%) scale(6);}
}

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
z-index:999;
}

.loader-img{
width:80px;
height:80px;
border-radius:50%;
animation:float 2.5s infinite;
}

.progress-bar{
width:70%;
height:20px;
background:#222;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0;
background:white;
animation:load 4s forwards;
}

@keyframes load{to{width:100%;}}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.hide{animation:fade 1s forwards;}
@keyframes fade{to{opacity:0;visibility:hidden;}}

#main{
display:none;
height:100vh;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#111;
padding:30px;
border-radius:20px;
text-align:center;
width:90%;
max-width:320px;
box-shadow:0 0 30px rgba(255,255,255,0.08);
}

.card img{
width:140px;
height:140px;
border-radius:50%;
animation:float 3s infinite;
}

h1{margin-top:15px;}
p{color:#ccc;}

.discord{
margin-top:15px;
cursor:pointer;
}

.discord svg{
width:35px;
height:35px;
fill:white;
transition:0.3s;
}

.discord svg:hover{
transform:scale(1.2);
fill:#5865F2;
}

@media(min-width:768px){
.card{
max-width:400px;
padding:40px;
}

.card img{
width:170px;
height:170px;
}

h1{font-size:28px;}
p{font-size:18px;}
}
</style></head><body><div class="bg"></div>
<div id="cursor"></div><div id="loader">
<img class="loader-img" src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<div class="progress-bar"><div class="progress"></div></div>
</div><div id="main">
<div class="card">
<img src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<h1>Ahmed</h1>
<p>Developer</p><div class="discord" onclick="openDiscord()">
<svg viewBox="0 0 24 24">

</svg>
</div></div>
</div><script>
for(let i=0;i<50;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*10)+"s";
document.querySelector(".bg").appendChild(s);
}

const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

document.addEventListener("click",e=>{
let light=document.createElement("div");
light.className="click-light";
light.style.left=e.clientX+"px";
light.style.top=e.clientY+"px";
document.body.appendChild(light);
setTimeout(()=>light.remove(),500);
});

setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
document.getElementById("main").style.display="flex";
},4000);

function openDiscord(){
window.open("https://discord.com/users/1303062740092588132","_blank");
}
</script></body>
</html>
