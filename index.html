<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#000;
color:#fff;
overflow-x:hidden;
cursor:none;
}

#cursor{
position:fixed;
width:10px;
height:10px;
background:#fff;
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
transition:0.05s;
}

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

.menu{
position:fixed;
top:60px;
left:20px;
background:#111;
padding:15px;
border-radius:10px;
display:none;
flex-direction:column;
gap:10px;
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(-10px);}
to{opacity:1;transform:translateY(0);}
}

.menu div{cursor:pointer;}

section{
display:none;
min-height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
opacity:0;
transform:scale(0.98);
transition:0.25s ease;
}

section.active{
display:flex;
opacity:1;
transform:scale(1);
}

.card{
background:#111;
padding:40px;
border-radius:20px;
text-align:center;
width:400px;
max-width:90%;
}

.card img{
width:160px;
height:160px;
border-radius:50%;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
width:100%;
max-width:600px;
}

.lang{
background:#111;
padding:15px;
border-radius:15px;
text-align:center;
}

.project{
background:#111;
padding:20px;
border-radius:20px;
width:400px;
max-width:90%;
}

.project img{
width:100%;
border-radius:15px;
margin-top:10px;
}

.btn{
display:block;
margin-top:10px;
padding:12px;
background:#fff;
color:#000;
border-radius:10px;
text-decoration:none;
transition:0.2s;
}

.btn:hover{transform:scale(1.03);}

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
z-index:999;
}

.progress-bar{
width:70%;
height:18px;
background:#222;
border-radius:50px;
overflow:hidden;
}

.progress{
height:100%;
width:0;
background:#fff;
animation:load 2.2s forwards;
}

@keyframes load{to{width:100%;}}

.loader-img{
width:90px;
height:90px;
border-radius:50%;
animation:float 5s ease-in-out infinite;
}
</style>
</head>

<body>

<div id="cursor"></div>

<div id="loader">
<img class="loader-img" src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<div class="progress-bar"><div class="progress"></div></div>
</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
<div onclick="show('home')">Home</div>
<div onclick="show('exp')">Experiences</div>
<div onclick="show('projects')">Projects</div>
</div>

<section id="home" class="active">
<div class="card">
<img src="https://i.ibb.co/gLC8HvRw/fc83e762663e.jpg">
<h1>Ahmed</h1>
<p>Developer</p>
</div>
</section>

<section id="exp">
<div class="card">
<h2>Experiences</h2>
<div class="grid">
<div class="lang">HTML</div>
<div class="lang">CSS</div>
<div class="lang">JS</div>
<div class="lang">Python</div>
<div class="lang">Java</div>
</div>
</div>
</section>

<section id="projects">
<div class="project">
<h2>Final Bank</h2>
<img src="https://i.ibb.co/9jj6hFw/958d5cb18110.png">
<a class="btn" href="#" target="_blank">Add Bot</a>
<a class="btn" href="#" target="_blank">Support</a>
</div>
</section>

<script>

const cursor=document.getElementById("cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

function toggleMenu(){
const m=document.getElementById("menu");
m.style.display=(m.style.display==="flex")?"none":"flex";
}

function show(id){
document.querySelectorAll("section").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

document.getElementById("menu").style.display="none";
}

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2200);

</script>

</body>
</html>
